[workspace]
resolver = "2"
members = [
  "crates/futarchy-fixed",
  "crates/futarchy-primitives",
  "crates/attestor-core",
  "crates/conditional-ledger-core",
  "crates/constitution-core",
  "crates/epoch-core",
  "crates/execution-guard-core",
  "crates/futarchy-treasury-core",
  "crates/guardian-core",
  "crates/market-core",
  "crates/oracle-core",
  "crates/origins-core",
  "crates/registry-core",
  "crates/welfare-core",
  "pallets/constitution",
  "pallets/conditional-ledger",
  "pallets/market",
  "pallets/origins",
  "pallets/oracle",
  "pallets/registry",
  "pallets/futarchy-treasury",
  "pallets/guardian",
  "pallets/attestor",
  "pallets/welfare",
  "pallets/epoch",
  "pallets/execution-guard",
  "runtime/bleavit-runtime",
]

[workspace.package]
edition = "2021"
license = "GPL-3.0"
repository = "https://github.com/bleavit/bleavit"

[workspace.dependencies]
# Polkadot SDK umbrella crate pin verified in PLAN.md V-1.
polkadot-sdk = "2603.0.0"

[workspace]
resolver = "2"
# `keeper/` and `fuzz/` are deliberately separate cargo workspaces: their
# off-chain/nightly dependency trees must never perturb the `=`-exact
# polkadot-stable2606 pins of this runtime workspace (01 §9; PLAN V-1).
exclude = ["keeper", "fuzz"]
members = [
  "crates/futarchy-fixed",
  "crates/futarchy-primitives",
  "crates/attestor-core",
  "crates/conditional-ledger-core",
  "crates/constitution-core",
  "crates/epoch-core",
  "crates/execution-guard-core",
  "crates/futarchy-treasury-core",
  "crates/guardian-core",
  "crates/market-core",
  "crates/oracle-core",
  "crates/origins-core",
  "crates/registry-core",
  "crates/welfare-core",
  "pallets/constitution",
  "pallets/conditional-ledger",
  "pallets/market",
  "pallets/origins",
  "pallets/oracle",
  "pallets/registry",
  "pallets/futarchy-treasury",
  "pallets/guardian",
  "pallets/attestor",
  "pallets/inflow-caps",
  "pallets/welfare",
  "pallets/epoch",
  "pallets/execution-guard",
  "runtime/bleavit-runtime",
  "runtime/bleavit-xcm",
  "runtime-api",
  "node/bleavit-node",
]

[workspace.package]
edition = "2021"
license = "GPL-3.0"
repository = "https://github.com/bleavit/bleavit"

[workspace.dependencies]
# FRAME crates on the `polkadot-stable2606` release train (01 §9; PLAN V-1;
# the B11 line-move adoption is in PLAN's Verification log).
# The polkadot-sdk 2606.0.0 umbrella crate is the *version source* for these
# pins (its manifest names this exact family), but it must NOT be depended on
# directly: lockfile resolution drags the whole node stack in.
# Versions are `=`-exact so `cargo update` cannot silently drift the SDK mix
# (Codex adversarial-review finding, 2026-07-15); at adoption (2026-07-17) no
# crate in the family had a crates.io patch release beyond the umbrella's own
# versions, so every pin is the umbrella-named version verbatim.
frame-support = { version = "=48.0.0", default-features = false }
frame-system = { version = "=48.0.0", default-features = false }
frame-benchmarking = { version = "=49.0.0", default-features = false }
# Runtime-benchmark helper shims (B5): system `set_code` + parachain session
# benchmarks need these SDK-side harness crates; versions from the same train.
frame-system-benchmarking = { version = "=49.0.0", default-features = false }
cumulus-pallet-session-benchmarking = { version = "=30.0.0", default-features = false }
# Runtime API declarations on the same `polkadot-stable2606` release train.
sp-api = { version = "=43.0.0", default-features = false }
sp-runtime = { version = "=48.0.0", default-features = false }
sp-io = { version = "=48.0.0", default-features = false }
sp-core = { version = "=43.0.0", default-features = false }
# Test-only SDK crates for pallet mock runtimes (fungibles collateral mocks).
pallet-assets = { version = "=52.0.0", default-features = false }
pallet-balances = { version = "=50.0.0", default-features = false }
cumulus-pallet-aura-ext = { version = "=0.29.0", default-features = false }
cumulus-pallet-parachain-system = { version = "=0.29.0", default-features = false }
cumulus-pallet-xcm = { version = "=0.27.0", default-features = false }

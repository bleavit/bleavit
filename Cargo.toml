cumulus-primitives-parachain-inherent = { version = "=0.26.0", default-features = false }
cumulus-primitives-storage-weight-reclaim = { version = "=20.0.0", default-features = false }
cumulus-primitives-utility = { version = "=0.30.0", default-features = false }
cumulus-test-relay-sproof-builder = { version = "=0.27.0" }
frame-executive = { version = "=48.0.0", default-features = false }
frame-metadata-hash-extension = { version = "=0.16.0", default-features = false }
frame-system-rpc-runtime-api = { version = "=43.0.0", default-features = false }
frame-try-runtime = { version = "=0.54.0", default-features = false }
pallet-asset-tx-payment = { version = "=49.0.0", default-features = false }
pallet-aura = { version = "=48.0.0", default-features = false }

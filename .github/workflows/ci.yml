name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev protobuf-compiler
      - name: Rust workspace, runtime wasm, and try-runtime gates
        run: tools/ci/rust-workspace-gates.sh

  reference-model:
    name: Reference model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run reference model tests
        run: PYTHONPATH=reference-model/src python3 -m unittest discover -s reference-model/tests
      - name: Run deploy validator tests
        run: python3 -m unittest discover -s tools/deploy/tests
      - name: Check generated vector corpus
        run: python3 tools/reference-model/generate-vectors.py --check
      - name: Check normative LMSR documentation table
        run: python3 tools/reference-model/check-doc-table.py

  docs:
    name: Documentation links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check local Markdown links
        run: python3 tools/ci/check-doc-links.py

  # B7 environment release artifacts — 15 §4.7; 02 §11.
  environments:
    name: Environment definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install environment validator dependencies
        run: pip install pyyaml==6.0.2
      - name: Run environment validator tests
        run: python3 -m unittest discover -s tools/env/tests
      - name: Validate committed environment definitions
        run: python3 tools/env/validate-environments.py
      - name: Check environment shell syntax
        run: |
          bash -n tools/env/fetch-binaries.sh
          bash -n tools/env/generate-relay-specs.sh
      - name: Check Zombienet JavaScript helpers
        run: |
          for helper in zombienet/drills/js/*.js; do
            node --check "$helper"
          done

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    env:
      # Incremental artifacts roughly double the target size for no CI
      # benefit; stock runners have ~14 GB free against a ~35 GB build.
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
      - name: Free runner disk space (the workspace build needs ~35 GB)
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /usr/share/swift /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force > /dev/null 2>&1 || true
          df -h /
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev protobuf-compiler
      - name: Rust workspace, runtime wasm, and try-runtime gates
        run: tools/ci/rust-workspace-gates.sh

  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
      - name: Check lockfiles and RustSec advisories
        run: tools/ci/supply-chain-gates.sh

  reference-model:
    name: Reference model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run reference model tests
        run: PYTHONPATH=reference-model/src python3 -m unittest discover -s reference-model/tests
      - name: Run tooling tests
        shell: bash
        run: |
          set -euo pipefail
          for suite in tools/deploy/tests tools/reference-model/tests tools/release/tests; do
            if [[ -d "$suite" ]]; then
              python3 -m unittest discover -s "$suite"
            fi
          done
      - name: Check generated vector corpus
        run: python3 tools/reference-model/generate-vectors.py --check
      - name: Check normative LMSR documentation table
        run: python3 tools/reference-model/check-doc-table.py

  docs:
    name: Documentation links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check local Markdown links
        run: python3 tools/ci/check-doc-links.py

  weights:
    name: Weight regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Test weight regression gate
        run: python3 tools/ci/check-weight-regression.py --self-test
      - name: Check committed weight diffs
        run: python3 tools/ci/check-weight-regression.py

  benchmark-smoke:
    name: Benchmark smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # substrate-wasm-builder needs the Wasm runtime target on a clean runner.
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Install native build dependencies
        # omni-bencher's dependency tree reaches litep2p, whose build script
        # needs `protoc`; the workspace build needs libclang (bindgen).
        run: sudo apt-get update && sudo apt-get install -y libclang-dev protobuf-compiler
      - name: Install FRAME omni-bencher
        run: cargo install --locked frame-omni-bencher --version 0.15.0
      - name: Build benchmark runtime Wasm
        run: cargo build --locked --release -p bleavit-runtime --features runtime-benchmarks
      - name: Execute every pallet benchmark
        run: >-
          frame-omni-bencher v1 benchmark pallet
          --runtime target/release/wbuild/bleavit-runtime/bleavit_runtime.compact.compressed.wasm
          --all --steps 2 --repeat 1

  # B7 environment release artifacts — 15 §4.7; 02 §11.
  environments:
    name: Environment definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install environment validator dependencies
        run: pip install pyyaml==6.0.2
      - name: Run environment validator tests
        run: python3 -m unittest discover -s tools/env/tests
      - name: Validate committed environment definitions
        run: python3 tools/env/validate-environments.py
      - name: Check environment shell syntax
        run: |
          bash -n tools/env/fetch-binaries.sh
          bash -n tools/env/generate-relay-specs.sh
      - name: Check Zombienet JavaScript helpers
        run: |
          for helper in zombienet/drills/js/*.js; do
            node --check "$helper"
          done

name: Runtime release artifacts

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build a readiness bundle without publishing and tolerate known missing B2/B7/A8/A11 legs
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  supply-chain:
    name: Supply-chain gates
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev protobuf-compiler
      - name: Run release-blocking supply-chain gates
        run: tools/ci/supply-chain-gates.sh --summary-out release-work/supply-chain-summary.json
      - name: Preserve supply-chain disclosure for the release bundle
        uses: actions/upload-artifact@v4
        with:
          name: bleavit-supply-chain-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: release-work/supply-chain-summary.json

  gates:
    name: Standing workspace gates
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
      - name: Free runner disk space (the workspace build needs ~35 GB)
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /usr/share/swift /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force > /dev/null 2>&1 || true
          df -h /
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev protobuf-compiler
      - name: Run full workspace gates
        run: tools/ci/rust-workspace-gates.sh
      - name: Run release, deploy, and reference tooling suites
        shell: bash
        run: |
          set -euo pipefail
          for suite in tools/deploy/tests tools/reference-model/tests tools/release/tests; do
            if [[ -d "$suite" ]]; then
              python3 -m unittest discover -s "$suite"
            fi
          done

  artifacts:
    name: Build and verify release artifacts
    needs: [supply-chain, gates]
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      RELEASE_WORK: release-work
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Free runner disk space (runtime + node release builds need ~35 GB)
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /usr/share/swift /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force > /dev/null 2>&1 || true
          df -h /
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: bleavit-supply-chain-${{ github.run_id }}
          path: release-work
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev protobuf-compiler
      - name: Install pinned chainHead recorder dependency
        run: python3 -m pip install websockets==15.0.1
      - name: Build reproducible runtime input
        run: tools/release/build-runtime.sh "$RELEASE_WORK/runtime"
      - name: Generate and validate chain specs
        run: tools/deploy/generate-chain-specs.sh
      - name: Build the release node
        run: cargo build -p bleavit-node --release --locked
      - name: Extract SCALE metadata and runtime identity
        run: |
          python3 tools/release/extract-metadata.py \
            --wasm "$RELEASE_WORK/runtime/runtime.wasm" \
            --out-dir "$RELEASE_WORK/runtime"
      - name: Record critical-surface chainHead fixtures
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          recorder_args=()
          if [[ "$DRY_RUN" == "true" ]]; then
            recorder_args+=(--allow-missing)
          fi
          python3 tools/release/record-chainhead-fixtures.py \
            --metadata "$RELEASE_WORK/runtime/metadata.scale" \
            --out-dir "$RELEASE_WORK/chainhead" \
            "${recorder_args[@]}"
      - name: Verify committed reference-model corpus freshness
        run: python3 tools/reference-model/generate-vectors.py --check
      - name: Generate full release MPFR sweep
        run: python3 tools/reference-model/generate-vectors.py --sweep-out "$RELEASE_WORK/sweep"
      - name: Check the full sweep with futarchy-fixed
        run: BLEAVIT_SWEEP_DIR="$RELEASE_WORK/sweep" BLEAVIT_SWEEP_REQUIRE_FULL=1 cargo test -p futarchy-fixed --release --locked --test sweep -- --ignored --nocapture
      - name: Assemble content-addressed release bundle
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          assemble_args=()
          if [[ "$DRY_RUN" == "true" ]]; then
            assemble_args+=(--allow-missing)
          fi
          python3 tools/release/assemble-release.py \
            --output-dir "$RELEASE_WORK" \
            --runtime-dir "$RELEASE_WORK/runtime" \
            --fixtures-dir "$RELEASE_WORK/chainhead" \
            --sweep-dir "$RELEASE_WORK/sweep" \
            --tag "$GITHUB_REF_NAME" \
            --commit "$GITHUB_SHA" \
            --supply-chain-result passed \
            --supply-chain-summary "$RELEASE_WORK/supply-chain-summary.json" \
            "${assemble_args[@]}"
      - name: Upload immutable bundle for publication or dry-run inspection
        uses: actions/upload-artifact@v4
        with:
          name: bleavit-release-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: |
            release-work/dist/**
            release-work/release-manifest.json
            release-work/readiness-report.md

  publish:
    name: Attach bundle to GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [supply-chain, gates, artifacts]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bleavit-release-${{ github.run_id }}
          path: release-work
      - name: Publish the immutable tag release atomically
        env:
          GH_TOKEN: ${{ github.token }}
          # gh runs in an empty workspace (no checkout); GH_REPO supplies the
          # repository context every gh release/api call needs.
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Differentiate "release absent" from transient API failure instead
          # of masking both behind one silenced probe.
          set +e
          probe_output=$(gh release view "$GITHUB_REF_NAME" --json name 2>&1)
          probe_status=$?
          set -e
          if [[ "$probe_status" -eq 0 ]]; then
            echo "release already exists for immutable tag $GITHUB_REF_NAME" >&2
            exit 1
          elif [[ "$probe_output" != *"release not found"* ]]; then
            echo "cannot determine release state: $probe_output" >&2
            exit 1
          fi

          cat >release-notes.md <<'EOF'
          This release is a prerelease and is not canonical yet.

          An operator must mirror the complete content-addressed artifact set to Arweave and attach mirror evidence before canonical promotion. The evidence is a JSON object mapping each published SHA-256 digest to its Arweave TXID, as documented in `tools/release/README.md`. CI holds no Arweave keys.
          EOF
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --notes-file release-notes.md \
            --draft \
            --prerelease
          gh release upload "$GITHUB_REF_NAME" \
            release-work/dist/*

          gh release view "$GITHUB_REF_NAME" --json assets >release-assets.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          local = {
              path.name: path.stat().st_size
              for path in sorted(Path("release-work/dist").iterdir())
              if path.is_file()
          }
          remote = {
              item["name"]: item["size"]
              for item in json.loads(Path("release-assets.json").read_text())["assets"]
          }
          if remote != local:
              raise SystemExit(
                  "uploaded release assets differ from local inventory: "
                  f"local={local!r}, remote={remote!r}"
              )
          PY
          gh release edit "$GITHUB_REF_NAME" --draft=false --prerelease=true

# This topology boots the default-off `fast-timing` runtime wasm (SQ-128) with the
# drill-05 Coretime staging: the FutarchyTreasury quote authority + Coretime-side
# renewal account are seeded via the existing genesis fields so the permissionless
# `execute_coretime_renewal` call reaches its business logic under an engaged
# dead-man freeze — the 09 §4 D-9 exemption. The dead-man is engaged by the same
# real relay-parent-gap collator outage drill 04 uses (SQ-282). Test-only build;
# never a release artifact (09 §4/§7.1; 13 §1/§2).
# Bleavit local drill topology — 15 §4.7; 02 §8/§11; 09 §7.1.
[settings]
provider = "native"
timeout = 1000
node_spawn_timeout = 240

[relaychain]
chain = "paseo-local"
chain_spec_path = "zombienet/specs/out/paseo-local.json"
default_command = "zombienet/bin/polkadot"
default_args = ["--no-hardware-benchmarks"]

[[relaychain.nodes]]
name = "relay-alice"
validator = true

[[relaychain.nodes]]
name = "relay-bob"
validator = true

[[relaychain.nodes]]
name = "relay-charlie"
validator = true

[[relaychain.nodes]]
name = "relay-dave"
validator = true

# Non-validator managed PID for the real B9 keeper (subxt-dynamic; reads the live
# epoch.length so it adapts to fast-timing with no rebuild).
[[relaychain.nodes]]
name = "keeper"
validator = false
command = "zombienet/scripts/keeper-node.sh"
substrate_cli_args_version = 2
prometheus_prefix = "bleavit"
args = ["--keeper-node-url=ws://127.0.0.1:19944", "--keeper-signer-uri=//Alice"]

[[parachains]]
id = 4242
chain_spec_path = "zombienet/specs/out/bleavit-drill-fast-coretime.json"
cumulus_based = true

[[parachains.collators]]
name = "bleavit-collator-1"
command = "target/release/bleavit-node"
rpc_port = 19944

[[parachains.collators]]
name = "bleavit-collator-2"
command = "target/release/bleavit-node"

[[parachains.collators]]
name = "bleavit-collator-3"
command = "target/release/bleavit-node"

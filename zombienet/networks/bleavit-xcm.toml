# Bleavit XCM drill topology — 15 §4.7; 02 §8/§11; 09 §4/§6.1/§7.1.
[settings]
provider = "native"
# Accommodates the real 4,800-relay-block dead-man threshold in drill 05.
# Accommodates the ≈57,600 s half-authority relay-finality stall of drill 05.
timeout = 120000
node_spawn_timeout = 300

[relaychain]
chain = "paseo-local"
chain_spec_path = "zombienet/specs/out/paseo-local.json"
default_command = "zombienet/bin/polkadot"
default_args = ["--no-hardware-benchmarks"]

[[relaychain.nodes]]
name = "relay-alice"
validator = true

[[relaychain.nodes]]
name = "relay-bob"
validator = true

[[relaychain.nodes]]
name = "relay-charlie"
validator = true

[[relaychain.nodes]]
name = "relay-dave"
validator = true

[[parachains]]
id = 4242
chain_spec_path = "zombienet/specs/out/bleavit-drill.json"
cumulus_based = true

[[parachains.collators]]
name = "bleavit-collator-1"
command = "target/release/bleavit-node"

[[parachains.collators]]
name = "bleavit-collator-2"
command = "target/release/bleavit-node"

[[parachains.collators]]
name = "bleavit-collator-3"
command = "target/release/bleavit-node"

[[parachains]]
id = 1000
chain_spec_path = "zombienet/specs/out/asset-hub-paseo-local.json"
cumulus_based = true

[[parachains.collators]]
name = "asset-hub-collator-1"
command = "zombienet/bin/polkadot-parachain"

[[parachains.collators]]
name = "asset-hub-collator-2"
command = "zombienet/bin/polkadot-parachain"

[[parachains]]
id = 1005
chain_spec_path = "zombienet/specs/out/coretime-paseo-local.json"
cumulus_based = true

[[parachains.collators]]
name = "coretime-collator-1"
command = "zombienet/bin/polkadot-parachain"

[[parachains.collators]]
name = "coretime-collator-2"
command = "zombienet/bin/polkadot-parachain"

[[hrmp_channels]]
sender = 4242
recipient = 1000
max_capacity = 8
max_message_size = 524288

[[hrmp_channels]]
sender = 1000
recipient = 4242
max_capacity = 8
max_message_size = 524288

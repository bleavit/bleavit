# Bleavit local drill topology — 15 §4.7; 02 §8/§11; 09 §7.1.
[settings]
provider = "native"
# Accommodates the Phase-1 907,200-block G1 long soak; individual drill steps
# retain tighter fail-fast bounds.
timeout = 6000000
node_spawn_timeout = 240

[relaychain]
chain = "paseo-local"
chain_spec_path = "zombienet/specs/out/paseo-local.json"
default_command = "zombienet/bin/polkadot"
default_args = ["--no-hardware-benchmarks"]

[[relaychain.nodes]]
name = "relay-alice"
validator = true

[[relaychain.nodes]]
name = "relay-bob"
validator = true

[[relaychain.nodes]]
name = "relay-charlie"
validator = true

[[relaychain.nodes]]
name = "relay-dave"
validator = true

[[parachains]]
id = 4242
chain_spec_path = "zombienet/specs/out/bleavit-drill.json"
cumulus_based = true

[[parachains.collators]]
name = "bleavit-collator-1"
command = "target/release/bleavit-node"

[[parachains.collators]]
name = "bleavit-collator-2"
command = "target/release/bleavit-node"

[[parachains.collators]]
name = "bleavit-collator-3"
command = "target/release/bleavit-node"
